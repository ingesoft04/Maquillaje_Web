worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ──────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;          # Ocultar versión de Nginx

    # ── Compresión Gzip ──────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # ── Límites de seguridad ──────────────────────────────
    client_max_body_size     20M;
    client_body_buffer_size  128k;
    large_client_header_buffers 4 16k;

    # ── Rate limiting global ──────────────────────────────
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api:10m      rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m     rate=5r/m;

    # ── Upstream: API Node.js ─────────────────────────────
    upstream sena_api {
        server api:4000;
        keepalive 32;
    }

    # ── Servidor HTTP → redirigir a HTTPS ────────────────
    server {
        listen 80;
        server_name tudominio.com www.tudominio.com;

        # Desafío Let's Encrypt (Certbot)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Todo lo demás → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── Servidor HTTPS principal ──────────────────────────
    server {
        listen 443 ssl http2;
        server_name tudominio.com www.tudominio.com;

        # ── Certificados SSL (Certbot/Let's Encrypt) ──
        ssl_certificate     /etc/letsencrypt/live/tudominio.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/tudominio.com/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/tudominio.com/chain.pem;

        # ── SSL hardening ──────────────────────────────
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling on;
        ssl_stapling_verify on;

        # ── Headers de seguridad ───────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Frontend (HTML estático) ───────────────────
        root /var/www/sena;
        index index.html;

        location / {
            limit_req zone=general burst=20 nodelay;
            try_files $uri $uri/ /index.html;

            # Caché para assets estáticos
            location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }
        }

        # ── API → proxy a Node.js ──────────────────────
        location /api/ {
            limit_req zone=api burst=30 nodelay;

            proxy_pass         http://sena_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ── Rate limiting estricto para auth ──────────
        location /api/auth/login {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://sena_api;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/auth/registro {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass http://sena_api;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Health check ───────────────────────────────
        location /health {
            proxy_pass http://sena_api/health;
            access_log off;
        }
    }
}
