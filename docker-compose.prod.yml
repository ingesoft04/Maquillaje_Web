version: "3.9"

# ═══════════════════════════════════════════════════════
#  SENA Maquillaje — Stack completo de producción
#  Servicios: Nginx · Node.js API · PostgreSQL · Redis
# ═══════════════════════════════════════════════════════

services:

  # ── NGINX (reverse proxy + SSL) ───────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: sena_nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/var/www/sena:ro          # HTML del frontend
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── CERTBOT (renovación automática SSL) ───────────────
  certbot:
    image: certbot/certbot:latest
    container_name: sena_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Renueva el certificado cada 12 horas si está por vencer
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"

  # ── POSTGRESQL ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sena_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-sena}
      POSTGRES_PASSWORD: ${DB_PASS:-sena1234}
      POSTGRES_DB:       ${DB_NAME:-maquillaje_sena}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./backups:/backups                  # para pg_dump
    ports:
      - "127.0.0.1:5432:5432"              # solo localhost, no expuesto al exterior
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sena}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── REDIS ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sena_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASS:-redis1234}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"              # solo localhost
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS:-redis1234}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API NODE.JS ───────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sena_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV:      production
      PORT:          4000
      DB_HOST:       postgres
      DB_PORT:       5432
      DB_USER:       ${DB_USER:-sena}
      DB_PASS:       ${DB_PASS:-sena1234}
      DB_NAME:       ${DB_NAME:-maquillaje_sena}
      REDIS_HOST:    redis
      REDIS_PORT:    6379
      REDIS_PASS:    ${REDIS_PASS:-redis1234}
      JWT_SECRET:    ${JWT_SECRET}
      FRONTEND_URL:  https://tudominio.com
    # NO expone el puerto al exterior — Nginx hace el proxy internamente
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_conf:
