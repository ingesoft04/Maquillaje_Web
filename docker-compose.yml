version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sena_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-sena}
      POSTGRES_PASSWORD: ${DB_PASS:-sena1234}
      POSTGRES_DB: ${DB_NAME:-maquillaje_sena}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sena}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sena_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASS:-redis1234} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS:-redis1234}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: sena_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-sena}
      DB_PASS: ${DB_PASS:-sena1234}
      DB_NAME: ${DB_NAME:-maquillaje_sena}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS: ${REDIS_PASS:-redis1234}
      JWT_SECRET: ${JWT_SECRET:-cambia_este_secreto_en_produccion}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "4000:4000"
    volumes:
      - ./src:/app/src

volumes:
  postgres_data:
  redis_data:
